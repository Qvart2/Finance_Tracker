{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="card" style="max-width: 420px; width: 100%;">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fas fa-user-plus" style="font-size: 48px; color: #667eea; margin-bottom: 15px;"></i>
            <h1 style="margin-bottom: 10px;">Создать аккаунт</h1>
            <p style="color: #6b7280;">Присоединяйтесь к Finance Tracker</p>
        </div>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Имя пользователя</label>
                <input type="text" id="username" name="username" placeholder="Придумайте имя" required>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Пароль</label>
                <input type="password" id="password" name="password" placeholder="Придумайте пароль" required>
            </div>
            
            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-lock"></i> Подтвердите пароль</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Повторите пароль" required>
            </div>
            
            <button type="submit" class="btn btn-block">
                <i class="fas fa-user-plus"></i> Зарегистрироваться
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 25px; color: #6b7280;">
            <p>Уже есть аккаунт? <a href="{{ url_for('login') }}" style="color: #667eea; font-weight: 600;">Войти</a></p>
        </div>
    </div>
</div>

<style>
.btn-block {
    justify-content: center;
    padding: 14px;
    font-size: 16px;
}
</style>

<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        confirm_password: document.getElementById('confirm_password').value
    };
    
    fetch('{{ url_for("register") }}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(formData)
    })
    .then(response => response.json())
    .then(result => {
        if (result.success) {
            showToast(result.message, 'success');
            if (result.redirect) {
                setTimeout(() => {
                    window.location.href = result.redirect;
                }, 1500);
            }
        } else {
            showToast(result.message, 'error');
            if (result.errors) {
                for (const [field, errors] of Object.entries(result.errors)) {
                    const input = document.querySelector(`[name="${field}"]`);
                    if (input) {
                        input.style.borderColor = '#ef4444';
                    }
                }
            }
        }
    })
    .catch(error => {
        showToast('Произошла ошибка. Попробуйте ещё раз.', 'error');
        console.error('Error:', error);
    });
});
</script>
{% endblock %}
