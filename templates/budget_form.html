{% extends "base.html" %}

{% block title %}{{ action }} бюджет{% endblock %}

{% block content %}
<nav>
    <span class="nav-brand">Finance Tracker</span>
    <div>
        <a href="{{ url_for('dashboard') }}">Транзакции</a>
        <a href="{{ url_for('categories') }}">Категории</a>
        <a href="{{ url_for('budgets') }}">Бюджеты</a>
        <a href="{{ url_for('logout') }}">Выйти</a>
    </div>
</nav>

<div class="card">
    <h1>{{ action }} бюджет</h1>
    
    <form id="budgetForm">
        <div class="form-group">
            <label for="category_id">Категория (расходы)</label>
            <select id="category_id" name="category_id" required>
                <option value="">— Выберите категорию —</option>
                {% for category in form.category_id.choices %}
                <option value="{{ category[0] }}" {% if form.category_id.data == category[0] %}selected{% endif %}>
                    {{ category[1] }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="limit">Лимит бюджета</label>
            <input type="number" id="limit" name="limit" step="0.01" min="0.01" 
                   value="{{ form.limit.data or '' }}" required
                   placeholder="0.00">
        </div>
        
        <div class="form-group">
            <label for="month">Месяц</label>
            <select id="month" name="month" required>
                <option value="">— Выберите месяц —</option>
                {% for m in range(1, 13) %}
                <option value="{{ m }}" {% if form.month.data == m %}selected{% endif %}>
                    {{ ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'][m - 1] }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="year">Год</label>
            <select id="year" name="year" required>
                <option value="">— Выберите год —</option>
                {% for y in form.year.choices %}
                <option value="{{ y[0] }}" {% if form.year.data == y[0] %}selected{% endif %}>
                    {{ y[1] }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('budgets') }}" class="btn btn-secondary">Отмена</a>
            <button type="submit" class="btn">{{ action }}</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
    document.getElementById('budgetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = {
            category_id: document.getElementById('category_id').value,
            limit: document.getElementById('limit').value,
            month: document.getElementById('month').value,
            year: document.getElementById('year').value
        };
        
        const url = '{{ url_for("add_budget") }}';
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(formData)
            });
            
            const result = await response.json();
            
            document.querySelectorAll('.error').forEach(el => el.remove());
            document.querySelectorAll('.field-error').forEach(el => el.classList.remove('field-error'));
            
            if (result.success) {
                showAlert(result.message, 'success');
                if (result.redirect) {
                    setTimeout(() => window.location.href = result.redirect, 1000);
                }
            } else {
                showAlert(result.message, 'error');
                
                if (result.errors) {
                    for (const [field, errors] of Object.entries(result.errors)) {
                        const input = document.querySelector(`[name="${field}"]`);
                        if (input) {
                            input.classList.add('field-error');
                            errors.forEach(errorText => {
                                const errorDiv = document.createElement('div');
                                errorDiv.className = 'error';
                                errorDiv.textContent = errorText;
                                input.parentElement.appendChild(errorDiv);
                            });
                        }
                    }
                }
            }
        } catch (error) {
            showAlert('Произошла ошибка.', 'error');
        }
        
        return false;
    });
</script>
{% endblock %}
