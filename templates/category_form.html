{% extends "base.html" %}

{% block title %}{{ action }} категорию{% endblock %}

{% block content %}
<nav>
    <span class="nav-brand">💰 Финансовый трекер</span>
    <div>
        <span style="margin-right: 15px; color: #666;">Привет, {{ current_user.username }}!</span>
        <a href="{{ url_for('dashboard') }}">Транзакции</a>
        <a href="{{ url_for('categories') }}">Категории</a>
        <a href="{{ url_for('budgets') }}">Бюджеты</a>
        <a href="{{ url_for('logout') }}">Выйти</a>
    </div>
</nav>

<div class="card">
    <h1 style="margin-bottom: 20px;">{{ action }} категорию</h1>
    
    <form id="categoryForm">
        <div class="form-group">
            <label for="name">Название категории</label>
            <input type="text" id="name" name="name" value="{{ category.name if category else '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="type">Тип</label>
            <select id="type" name="type" required>
                <option value="expense" {% if category and category.type == 'expense' %}selected{% endif %}>Расход</option>
                <option value="income" {% if category and category.type == 'income' %}selected{% endif %}>Доход</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="color">Цвет (HEX код)</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="color" id="colorPicker" value="{{ category.color if category else '#667eea' }}" 
                       style="width: 50px; height: 40px; padding: 0; border: none; cursor: pointer;">
                <input type="text" id="color" name="color" value="{{ category.color if category else '#667eea' }}" 
                       pattern="^#[0-9A-Fa-f]{6}$" placeholder="#667eea" style="flex: 1;">
            </div>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="btn">{{ action }}</button>
            <a href="{{ url_for('categories') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>

<script>
document.getElementById('colorPicker').addEventListener('input', function(e) {
    document.getElementById('color').value = e.target.value;
});

document.getElementById('color').addEventListener('input', function(e) {
    if (/^#[0-9A-Fa-f]{6}$/.test(e.target.value)) {
        document.getElementById('colorPicker').value = e.target.value;
    }
});

document.getElementById('categoryForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = {
        name: document.getElementById('name').value,
        type: document.getElementById('type').value,
        color: document.getElementById('color').value
    };
    
    const url = '{{ action_url if action_url else url_for("add_category") }}';
    
    fetch(url, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify(formData)
    })
    .then(response => response.json())
    .then(result => {
        if (result.success) {
            showAlert(result.message, 'success');
            setTimeout(() => {
                window.location.href = result.redirect || '{{ url_for("categories") }}';
            }, 1000);
        } else {
            showAlert(result.message, 'error');
        }
    })
    .catch(error => {
        showAlert('Произошла ошибка. Попробуйте ещё раз.', 'error');
        console.error('Error:', error);
    });
});
</script>
{% endblock %}
